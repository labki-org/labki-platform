services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: labki
      MARIADB_USER: labki
      MARIADB_PASSWORD: labki_pass
      MARIADB_ROOT_PASSWORD: root_pass
    # volumes:
    #   - labki_platform_db-data:/var/lib/mysql

  wiki:
    build:
      context: ../
      dockerfile: docker/Dockerfile
      target: ${DOCKER_TARGET:-prod}
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      MW_DB_HOST: db
      MW_DB_NAME: labki
      MW_DB_USER: labki
      MW_DB_PASSWORD: labki_pass
      MW_SITE_NAME: "Labki Dev"
      MW_ADMIN_PASS: "changeme123v_pass"
      # Set to 1 to test without platform extensions
      # MW_DISABLE_PLATFORM_EXTENSIONS: 0
    # volumes:
    #   - ../mediawiki:/opt/labki/mediawiki
    #   - ../../MyExtension:/var/www/html/extensions/MyExtension
    #   - ../../MySkin:/mw-user-skins/MySkin
    depends_on:
      - db
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80/wiki/Main_Page" ]
      interval: 30s
      timeout: 10s
      retries: 3

  wiki-jobrunner:
    build:
      context: ../
      dockerfile: docker/Dockerfile
      target: ${DOCKER_TARGET:-prod}
    restart: unless-stopped
    environment:
      MW_DB_HOST: db
      MW_DB_NAME: labki
      MW_DB_USER: labki
      MW_DB_PASSWORD: labki_pass
    depends_on:
      - db
      - wiki
    command: [ "/opt/labki/scripts/run-jobrunner.sh" ]
